# Render.com blueprint for the Torn Script Registry.
# Connect this repo on render.com → "New +" → "Blueprint" → pick this file.
services:
  - type: web
    name: script-registry
    runtime: python
    plan: free
    # No deps beyond the Python stdlib, so the build step is a no-op.
    buildCommand: "python -c \"print('no build needed')\""
    startCommand: "python server.py"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: PROD
        value: "1"
      - key: DATA_DIR
        value: "/var/data"
    disk:
      name: registry-data
      mountPath: /var/data
      sizeGB: 1
