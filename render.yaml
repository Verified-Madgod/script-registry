# Render.com blueprint for the Torn Script Registry.
# Connect this repo on render.com → "New +" → "Blueprint" → pick this file.
#
# Data lives in the repo at ./data/ and is served read-only in PROD mode.
# To refresh content on the deployed site, commit new data files and push.
services:
  - type: web
    name: script-registry
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python server.py"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: PROD
        value: "1"
